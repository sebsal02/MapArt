<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://nominatim.openstreetmap.org;">
  <title>MapArt - Galeria de Mapas</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: var(--bg-deep);
      overflow-y: auto;
      min-height: 100vh;
    }

    .galeria-header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 28px 24px;
      text-align: center;
    }

    .galeria-header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.5px;
    }

    .galeria-header h1 span {
      color: var(--accent);
    }

    .galeria-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .galeria-grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .galeria-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      opacity: 0;
      animation: cardSlideIn 0.5s ease forwards;
    }

    @keyframes cardSlideIn {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .galeria-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4), 0 0 24px var(--accent-glow);
      border-color: var(--border-hover);
    }

    .galeria-card-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-bottom: 1px solid var(--border);
      background: var(--bg-deep);
    }

    .galeria-card-body {
      padding: 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .galeria-card-name {
      font-family: 'Outfit', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--accent-light);
      transition: color 0.2s ease;
    }

    .galeria-card:hover .galeria-card-name {
      color: #fff;
    }

    .galeria-card-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-style: italic;
      border-left: 2px solid var(--accent);
      padding-left: 10px;
      line-height: 1.5;
    }

    .galeria-card-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: auto;
      padding-top: 8px;
    }

    .galeria-card-meta b {
      color: var(--text-secondary);
    }

    .galeria-card-action {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }

    .galeria-card-action a.btn-view {
      flex: 1;
      display: block;
      text-align: center;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      border-radius: var(--radius);
      text-decoration: none;
      font-size: 0.88rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .galeria-card-action a.btn-view:hover {
      background: var(--accent-light);
      box-shadow: 0 0 20px var(--accent-glow);
      transform: translateY(-1px);
    }

    .galeria-card-action button.btn-delete {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 14px;
      background: rgba(255, 68, 102, 0.12);
      color: var(--danger);
      border: 1px solid rgba(255, 68, 102, 0.3);
      font-weight: 600;
      border-radius: var(--radius);
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: 'Inter', sans-serif;
    }

    .galeria-card-action button.btn-delete:hover {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
      box-shadow: 0 0 20px rgba(255, 68, 102, 0.4);
      transform: translateY(-1px);
    }

    #loading {
      text-align: center;
      padding: 60px 20px;
      font-size: 1rem;
      color: var(--text-muted);
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      animation: fadeIn 0.6s ease;
    }

    .empty-state h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.4rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .galeria-header {
      animation: fadeIn 0.5s ease;
    }

    @media (max-width: 700px) {
      .galeria-grid {
        grid-template-columns: 1fr;
      }

      .galeria-header h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

<body>

  <div class="galeria-header">
    <h1>Map<span>Art</span></h1>
    <p>Galeria de mapas creados por todos los alumnos</p>
  </div>

  <div id="loading">Cargando mapas...</div>

  <div class="galeria-grid" id="galeriaGrid" style="display:none;"></div>

  <script src="js/galeria.js"></script>
</body>

</html>
