<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org; connect-src 'self' https://nominatim.openstreetmap.org;">
  <title>MapArt - Visor de Mapa</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: var(--bg-deep);
      overflow-y: auto;
    }

    .viewer-container {
      max-width: 860px;
      margin: 0 auto;
      background: var(--bg-surface);
      min-height: 100vh;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.4);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .viewer-header {
      background: var(--bg-card);
      color: var(--text-primary);
      padding: 24px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .viewer-header h1 {
      font-family: 'Outfit', sans-serif;
      color: var(--accent);
      margin-bottom: 6px;
      font-size: 2rem;
      letter-spacing: -0.5px;
    }

    .viewer-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    #map {
      height: 350px;
      width: 100%;
      z-index: 1;
      border-bottom: 2px solid var(--accent);
    }

    .places-list {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .place-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--bg-card);
      transition: all 0.3s ease;
    }

    .place-card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .place-header {
      background: var(--bg-elevated);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }

    .place-num {
      background: var(--accent);
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 700;
      font-size: 0.9rem;
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .place-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .place-body {
      padding: 18px;
    }

    .place-address {
      font-size: 0.88rem;
      color: var(--neon);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .place-address svg {
      flex-shrink: 0;
    }

    .compare-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: var(--radius);
      width: 100%;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      transition: all 0.25s ease;
      font-family: 'Inter', sans-serif;
    }

    .compare-btn:hover {
      background: var(--accent-light);
      box-shadow: var(--shadow-glow);
    }

    .compare-btn:active {
      transform: scale(0.98);
    }

    .images-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .img-box {
      text-align: center;
    }

    .img-box img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      cursor: zoom-in;
      transition: all 0.25s ease;
    }

    .img-box img:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .img-box p {
      font-size: 0.78rem;
      margin-top: 8px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #loading {
      padding: 60px;
      text-align: center;
      font-size: 1.1rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .back-link {
      display: inline-block;
      padding: 10px 20px;
      margin: 20px;
      color: var(--accent-light);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: all 0.25s ease;
    }

    .back-link:hover {
      background: var(--bg-elevated);
      border-color: var(--border-hover);
    }
  </style>
</head>

<body>

  <div class="viewer-container">
    <div class="viewer-header">
      <h1>MapArt</h1>
      <p id="authorName">Cargando identificador de mapa...</p>
    </div>

    <div id="loading">Conectando a base de datos...</div>

    <div id="content" style="display:none;">
      <div id="map"></div>
      <a href="galeria.html" class="back-link">← Volver a la Galeria</a>
      <div class="places-list" id="placesList"></div>
    </div>
  </div>

  <!-- Modal Compare -->
  <div class="modal-ov" id="modalCmp" style="padding:0;">
    <div class="modal large-modal" style="position:relative;">
      <div class="modal-hdr" style="padding-right: 60px;">
        <h3 id="modalTit" style="margin:0;font-size:1.1rem;">Visor Comparativo</h3>
        <button onclick="document.getElementById('modalCmp').classList.remove('on')" class="close-btn"
          style="position:absolute; top:15px; right:15px; background:var(--danger); border-radius:50%; width:40px; height:40px; display:flex; justify-content:center; align-items:center; font-size:1.5rem; font-weight:bold; box-shadow:0 2px 5px rgba(0,0,0,0.2); z-index:100;">X</button>
      </div>
      <div class="modal-body">
        <p class="instruction">Deslice el control central para examinar los detalles.</p>
        <div class="slider-box" id="sBox">
          <img id="sIlus" class="slider-img" src="">
          <img id="sReal" class="slider-img top" src="">
          <div class="slider-line" id="sLine"></div>
          <div class="slider-handle" id="sHandle">||</div>
        </div>
        <div
          style="display:flex;justify-content:space-between;margin-top:12px;font-size:0.78rem;font-weight:600;color:var(--text-muted);letter-spacing:0.5px;">
          <span>CAPA: ILUSTRACION</span>
          <span>CAPA: FOTOGRAFIA</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Visor de Imagen Individual -->
  <div class="modal-ov" id="modalImgFull">
    <div class="modal" style="background:transparent; box-shadow:none; border:none; align-items:center;">
      <button onclick="document.getElementById('modalImgFull').classList.remove('on')" class="close-btn"
        style="position:absolute; top:20px; right:20px; background:var(--bg-elevated); color:#fff; border-radius:50%; width:40px; height:40px; display:flex; align-items:center; justify-content:center;">X</button>
      <img id="imgFullTarget" src=""
        style="max-width:100%; height:auto; max-height:85vh; object-fit:contain; border-radius:12px; box-shadow: 0 8px 40px rgba(0,0,0,0.6);">
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/viewer.js"></script>
</body>

</html>
